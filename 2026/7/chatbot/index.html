<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z.ai Chat</title>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #eee; margin: 0; padding: 20px; box-sizing: border-box; }
        #chat { display: flex; flex-direction: column; gap: 15px; margin-bottom: 90px; }
        .msg { padding: 10px 15px; border-radius: 8px; max-width: 85%; white-space: pre-wrap; word-wrap: break-word; }
        .user { background: #2b3a4a; align-self: flex-end; border: 1px solid #4a6a8a; color: #a6c8e8; }
        .assistant { background: #333; align-self: flex-start; border: 1px solid #444; }
        .reasoning { color: #d7ba7d; font-style: italic; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 10px; background: #252526; padding: 15px 20px; border-top: 1px solid #444; }
        textarea { flex: 1; background: #1e1e1e; color: #eee; border: 1px solid #444; padding: 10px; border-radius: 4px; resize: none; height: 40px; font-family: inherit; }
        button, input[type="file"]::file-selector-button { background: #0e639c; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1177bb; }
    </style>
</head>
<body>
    <div id="chat">
        <!-- CHAT_CONTENT -->
    </div>
    <form class="input-area" method="POST" action="/" enctype="multipart/form-data">
        <input type="file" name="files" multiple>
        <textarea name="text" placeholder="Type your prompt... (Press Tab then Enter to Send)" required autofocus></textarea>
        <button type="submit">Send</button>
    </form>
</body>
</html>
